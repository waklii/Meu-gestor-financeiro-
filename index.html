<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gestor Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="app" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Gestor Financeiro</h2>
        
        <div id="auth-form">
            <input type="email" id="email" placeholder="E-mail" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="password" placeholder="Senha" class="w-full p-2 mb-4 border rounded">
            <button onclick="handleAuth()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600 transition">
                Entrar / Criar Conta
            </button>
            <p id="msg" class="mt-4 text-center text-sm text-red-500"></p>
        </div>

        <div id="main-content" class="hidden">
            <p class="mb-4">Olá, <span id="user-display" class="font-bold"></span>!</p>
            <button onclick="logout()" class="text-red-500 text-sm underline">Sair</button>
        </div>
    </div>

    <script>
        function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (email && password) {
                // Simulação de login/cadastro
                msg.classList.remove('text-red-500');
                msg.classList.add('text-green-500');
                msg.innerText = "Sucesso! Entrando...";

                setTimeout(() => {
                    document.getElementById('auth-form').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    document.getElementById('user-display').innerText = email;
                }, 1000);
            } else {
                msg.innerText = "Por favor, preencha todos os campos.";
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
