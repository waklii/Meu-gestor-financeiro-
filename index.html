<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Walace Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --azul: #007bff; --fundo: #f0f2f5; }
        body { background: var(--fundo); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .tela { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .ativa { display: block; }
        input, select, button { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #ddd; background: #fff; color: #000; 
            font-size: 16px; box-sizing: border-box;
        }
        button { background: var(--azul) !important; color: #fff !important; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-btn { flex: 1; border: none; background: none; padding: 15px; font-size: 12px; text-align: center; color: #666; cursor: pointer; }
        .nav-btn.on { color: var(--azul); font-weight: bold; }
        #meuGrafico { background: white; border-radius: 15px; padding: 10px; }
    </style>
</head>
<body>

    <div id="loader" style="display:flex; justify-content:center; align-items:center; height:100vh; background:#fff;">
        <b>🔄 Sincronizando Gestor Walace...</b>
    </div>

    <div id="telaLogin" class="tela">
        <h2 style="text-align:center;">🔒 Acesso Seguro</h2>
        <p style="text-align:center; font-size:12px; color:gray;">Digite e-mail e senha para entrar ou criar conta.</p>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha (mín. 6 dígitos)">
        <button id="btnLogar" onclick="logar()">ENTRAR / CADASTRAR</button>
        <button onclick="recuperar()" style="background:#6c757d !important;">Esqueci a Senha</button>
    </div>

    <div id="telaInicio" class="tela">
        <h2>💰 Novo Registro</h2>
        <input type="number" id="valor" placeholder="Valor R$">
        <input type="date" id="data">
        <input type="text" id="desc" placeholder="O que é? (ex: Almoço)">
        <select id="tipo">
            <option value="receita">➕ Entrada (Ganho)</option>
            <option value="despesa">➖ Saída (Gasto)</option>
        </select>
        <button onclick="salvar()">Salvar no Banco</button>
    </div>

    <div id="telaGraficos" class="tela">
        <h2>📊 Balanço Visual</h2>
        <canvas id="meuGrafico"></canvas>
    </div>

    <nav class="nav-bottom" id="menu" style="display:none;">
        <button class="nav-btn on" onclick="ir('telaInicio', this)">🏠<br>Início</button>
        <button class="nav-btn" onclick="ir('telaGraficos', this)">📊<br>Gráficos</button>
        <button class="nav-btn" onclick="firebase.auth().signOut()">🚪<br>Sair</button>
    </nav>

    <script>
        // --- CONFIGURAÇÃO REAL DO WALACE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA3iFxMHS0Y7_GKKI6uSO1HK_nveWRd5cQ",
            authDomain: "meugestor-40bb2.firebaseapp.com",
            projectId: "meugestor-40bb2",
            storageBucket: "meugestor-40bb2.firebasestorage.app",
            messagingSenderId: "717048947100",
            appId: "1:717048947100:web:f116e52683c815b6372859"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Navegação entre telas
        function ir(id, btn) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('ativa');
            if(btn) btn.classList.add('on');
            if(id === 'telaGraficos') carregarGrafico();
        }

        // Monitor de Login (Verifica se está logado)
        firebase.auth().onAuthStateChanged(user => {
            document.getElementById('loader').style.display = 'none';
            if (user) {
                document.getElementById('menu').style.display = 'flex';
                ir('telaInicio');
            } else {
                document.getElementById('menu').style.display = 'none';
                ir('telaLogin');
            }
        });

        // Função de Login e Cadastro Automático
        async function logar() {
            const e = document.getElementById('email').value, s = document.getElementById('senha').value;
            if(!e || !s) return alert("Preencha e-mail e senha!");
            const btn = document.getElementById('btnLogar');
            btn.innerText = "Processando...";
            
            try { 
                await firebase.auth().signInWithEmailAndPassword(e, s); 
            } catch (erro) {
                if (erro.code === 'auth/user-not-found' || erro.code === 'auth/wrong-password') {
                    try {
                        await firebase.auth().createUserWithEmailAndPassword(e, s);
                        alert("Bem-vindo! Conta criada com sucesso.");
                    } catch (e2) { alert("Erro ao criar conta: " + e2.message); }
                } else { alert("Atenção: " + erro.message); }
            }
            btn.innerText = "ENTRAR / CADASTRAR";
        }

        // Salvar dados no Firestore
        async function salvar() {
            const v = document.getElementById('valor').value, d = document.getElementById('data').value;
            if(!v || !d) return alert("Preencha valor e data!");
            try {
                await db.collection("financas").add({
                    valor: parseFloat(v), data: d, tipo: document.getElementById('tipo').value,
                    desc: document.getElementById('desc').value, userId: firebase.auth().currentUser.uid
                });
                alert("✅ Registro salvo!");
                document.getElementById('valor').value = "";
                document.getElementById('desc').value = "";
            } catch (e) { alert("Erro ao salvar: " + e.message); }
        }

        let chart;
        async function carregarGrafico() {
            try {
                const snap = await db.collection("financas").where("userId", "==", firebase.auth().currentUser.uid).get();
                let r = 0, d = 0;
                snap.forEach(doc => { if(doc.data().tipo === 'receita') r += doc.data().valor; else d += doc.data().valor; });
                const ctx = document.getElementById('meuGrafico').getContext('2d');
                if(chart) chart.destroy();
                chart = new Chart(ctx, { type: 'pie', data: { labels: ['Ganhos', 'Gastos'], datasets: [{ data: [r, d], backgroundColor: ['#28a745', '#dc3545'] }] } });
            } catch (e) { console.error("Erro no gráfico:", e); }
        }

        function recuperar() {
            const e = document.getElementById('email').value;
            if(!e) return alert("Digite seu e-mail.");
            firebase.auth().sendPasswordResetEmail(e).then(() => alert("E-mail de recuperação enviado!"));
        }
    </script>
</body>
</html>
